version: 2

builds:
  - id: sql-query
    main: .
    binary: sql-query
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X sql-query/cmd.version={{.Version}}
      - -X sql-query/cmd.commit={{.Commit}}
      - -X sql-query/cmd.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  groups:
    - title: "Features"
      regexp: '^.*?feat(\(.+\))?\!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?fix(\(.+\))?\!?:.+$'
      order: 1
    - title: "Refactoring"
      regexp: '^.*?refactor(\(.+\))?\!?:.+$'
      order: 2
    - title: "Others"
      order: 999
  filters:
    exclude:
      - '^Merge '

release:
  github:
    owner: user-zouyu
    name: sql-query
  name_template: "{{.Tag}}"
